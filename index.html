<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OneFootball Heads — Stats</title>
<style>
  :root {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --giphy-a: #a985ff;   /* line gradient start */
    --giphy-b: #ff6eb4;   /* line gradient end */
    --klipy: #2bd889;
    --up: #0ca30c;
    --down: #e66767;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 28px clamp(16px, 4vw, 48px) 60px;
  }
  header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  header .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .filters { display: flex; gap: 6px; margin: 26px 0 18px; flex-wrap: wrap; }
  .filters button {
    background: var(--surface); color: var(--ink-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 7px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .filters button:hover { background: #242423; }
  .filters button.active { background: linear-gradient(90deg, #7a4dff, #d94fa6); color: #fff; border-color: transparent; }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .tile .label { color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .tile .value { font-size: 26px; font-weight: 800; margin-top: 6px; }
  .tile .delta { font-size: 12px; margin-top: 4px; color: var(--muted); }
  .tile .delta .up { color: var(--up); font-weight: 700; }
  .tile .delta .down { color: var(--down); font-weight: 700; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 20px 12px; margin-top: 18px; position: relative;
  }
  .card h2 { font-size: 17px; font-weight: 800; }
  .card .h-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .chart-wrap { position: relative; margin-top: 10px; }
  .chart-wrap svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none; z-index: 5;
    background: #fff; color: #0b0b0b; border-radius: 8px; padding: 8px 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45); white-space: nowrap;
  }
  .tooltip .t-date { color: #52514e; font-size: 11px; }
  .tooltip .t-val { font-size: 15px; font-weight: 800; margin-top: 1px; }
  details.tableview { margin: 8px 0 4px; }
  details.tableview summary { color: var(--muted); font-size: 12px; cursor: pointer; }
  details.tableview .scroll { max-height: 260px; overflow: auto; margin-top: 8px; }
  details.tableview table { border-collapse: collapse; font-size: 12px; width: 100%; }
  details.tableview th, details.tableview td {
    text-align: left; padding: 4px 10px 4px 0; border-bottom: 1px solid var(--grid);
    font-variant-numeric: tabular-nums; color: var(--ink-2);
  }
  details.tableview th { color: var(--muted); position: sticky; top: 0; background: var(--surface); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
  .grid2 .card { margin-top: 0; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

  .gifgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-top: 14px; }
  .gifcard { text-decoration: none; color: inherit; }
  .gifcard img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; background: #242423; display: block; }
  .gifcard .g-views { font-size: 13px; font-weight: 800; margin-top: 6px; }
  .gifcard .g-title { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .barlist { margin-top: 12px; }
  .barrow { display: grid; grid-template-columns: 120px 1fr 70px; gap: 10px; align-items: center; padding: 5px 0; font-size: 13px; }
  .barrow .b-label { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .barrow .b-track { height: 10px; border-radius: 4px; background: #242423; overflow: hidden; }
  .barrow .b-fill { height: 100%; border-radius: 4px 4px 4px 4px; }
  .barrow .b-val { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); }

  .toplist { margin-top: 12px; }
  .toprow { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--grid); font-size: 13px; }
  .toprow:last-child { border-bottom: none; }
  .toprow a { color: var(--ink-2); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toprow a:hover { color: var(--ink); }
  .toprow .t-n { font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }

  .err { background: #3a1d1d; border: 1px solid #6b3333; color: #f0c0c0; padding: 12px 16px; border-radius: 8px; margin-top: 18px; font-size: 13px; display: none; }
  footer { color: var(--muted); font-size: 11px; margin-top: 30px; }
</style>
</head>
<body data-palette="#a985ff,#ff6eb4,#2bd889">

<header>
  <h1>OneFootball Heads</h1>
  <div class="sub">GIPHY &amp; KLIPY analytics — local dashboard</div>
</header>

<div class="err" id="err"></div>

<div class="filters" id="filters" role="group" aria-label="Date range">
  <button data-days="7">7D</button>
  <button data-days="30" class="active">30D</button>
  <button data-days="90">90D</button>
  <button data-days="180">6M</button>
  <button data-days="365">1Y</button>
  <button data-days="">All</button>
</div>

<div class="tiles" id="tiles"></div>

<div class="card">
  <h2>Total GIF &amp; Sticker Views</h2>
  <div class="h-sub">GIPHY · daily views</div>
  <div class="chart-wrap" id="giphyChart"></div>
  <details class="tableview"><summary>View as table</summary><div class="scroll" id="giphyTable"></div></details>
</div>

<div class="card">
  <h2>Impressions</h2>
  <div class="h-sub">KLIPY · daily impressions</div>
  <div class="chart-wrap" id="klipyChart"></div>
  <details class="tableview"><summary>View as table</summary><div class="scroll" id="klipyTable"></div></details>
</div>

<div class="card">
  <h2>Top GIFs</h2>
  <div class="h-sub">GIPHY · all-time views</div>
  <div class="gifgrid" id="gifgrid"></div>
</div>

<div class="grid2">
  <div class="card">
    <h2>Top on KLIPY</h2>
    <div class="h-sub">all-time impressions</div>
    <div class="toplist" id="klipyTop"></div>
  </div>
  <div class="card">
    <h2>KLIPY Countries</h2>
    <div class="h-sub">all-time impressions</div>
    <div class="barlist" id="countries"></div>
  </div>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const fmt = (n) => n.toLocaleString("en-US");
const fmtShort = (n) => {
  if (n >= 1e6) return (n / 1e6 >= 10 ? Math.round(n / 1e6) : (n / 1e6).toFixed(1)) + "M";
  if (n >= 1e3) return (n / 1e3 >= 10 ? Math.round(n / 1e3) : (n / 1e3).toFixed(1)) + "K";
  return String(n);
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmtDate = (iso) => { const [y, m, d] = iso.split("-").map(Number); return `${m}/${d}/${y}`; };
const fmtTick = (iso, long) => {
  const [y, m, d] = iso.split("-").map(Number);
  return long ? `${MONTHS[m - 1]} '${String(y).slice(2)}` : `${MONTHS[m - 1]} ${d}`;
};

function parseCSV(text) {
  const rows = []; let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n" || c === "\r") {
      if (field !== "" || row.length) { row.push(field); rows.push(row); row = []; field = ""; }
      if (c === "\r" && text[i + 1] === "\n") i++;
    } else field += c;
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  const head = rows.shift() || [];
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ""))
             .map(r => Object.fromEntries(head.map((h, i) => [h, r[i] ?? ""])));
}
const getCSV = (name) => fetch(`data/${name}`).then(r => {
  if (!r.ok) throw new Error(`${name}: HTTP ${r.status}`);
  return r.text();
}).then(parseCSV);

// ---------- line chart (SVG, crosshair + tooltip) ----------
function lineChart(container, series, opts) {
  container.innerHTML = "";
  const W = Math.max(560, container.clientWidth || 900), H = 300;
  const P = { l: 52, r: 16, t: 14, b: 30 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b;
  const n = series.length;
  const max = Math.max(1, ...series.map(p => p.v));
  const yMax = niceCeil(max);
  const x = (i) => P.l + (n <= 1 ? iw / 2 : (i / (n - 1)) * iw);
  const y = (v) => P.t + ih - (v / yMax) * ih;
  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", opts.aria);
  const uid = opts.id;

  // defs: line gradient + area fade
  const defs = document.createElementNS(svgNS, "defs");
  defs.innerHTML =
    `<linearGradient id="ln${uid}" x1="0" y1="0" x2="1" y2="0">` +
    `<stop offset="0" stop-color="${opts.colorA}"/><stop offset="1" stop-color="${opts.colorB}"/></linearGradient>` +
    `<linearGradient id="ar${uid}" x1="0" y1="0" x2="0" y2="1">` +
    `<stop offset="0" stop-color="${opts.colorB}" stop-opacity="0.22"/>` +
    `<stop offset="1" stop-color="${opts.colorB}" stop-opacity="0"/></linearGradient>`;
  svg.appendChild(defs);

  // y grid + ticks
  const ticks = 4;
  for (let t = 0; t <= ticks; t++) {
    const v = (yMax / ticks) * t, yy = y(v);
    const ln = document.createElementNS(svgNS, "line");
    ln.setAttribute("x1", P.l); ln.setAttribute("x2", W - P.r);
    ln.setAttribute("y1", yy); ln.setAttribute("y2", yy);
    ln.setAttribute("stroke", t === 0 ? "var(--baseline)" : "var(--grid)");
    ln.setAttribute("stroke-width", "1");
    svg.appendChild(ln);
    const tx = document.createElementNS(svgNS, "text");
    tx.setAttribute("x", P.l - 8); tx.setAttribute("y", yy + 4);
    tx.setAttribute("text-anchor", "end");
    tx.setAttribute("fill", "var(--muted)"); tx.setAttribute("font-size", "11");
    tx.textContent = fmtShort(v);
    svg.appendChild(tx);
  }
  // x ticks (~6)
  const long = n > 200;
  const step = Math.max(1, Math.round(n / 6));
  for (let i = 0; i < n; i += step) {
    const tx = document.createElementNS(svgNS, "text");
    tx.setAttribute("x", x(i)); tx.setAttribute("y", H - 8);
    tx.setAttribute("text-anchor", "middle");
    tx.setAttribute("fill", "var(--muted)"); tx.setAttribute("font-size", "11");
    tx.textContent = fmtTick(series[i].d, long);
    svg.appendChild(tx);
  }

  // area + line
  let dLine = "", dArea = `M ${x(0)} ${y(0)} `;
  series.forEach((p, i) => {
    dLine += (i ? "L" : "M") + ` ${x(i).toFixed(1)} ${y(p.v).toFixed(1)} `;
    dArea += `L ${x(i).toFixed(1)} ${y(p.v).toFixed(1)} `;
  });
  dArea += `L ${x(n - 1)} ${y(0)} Z`;
  const area = document.createElementNS(svgNS, "path");
  area.setAttribute("d", dArea); area.setAttribute("fill", `url(#ar${uid})`);
  svg.appendChild(area);
  const line = document.createElementNS(svgNS, "path");
  line.setAttribute("d", dLine);
  line.setAttribute("fill", "none");
  line.setAttribute("stroke", `url(#ln${uid})`);
  line.setAttribute("stroke-width", "2");
  line.setAttribute("stroke-linejoin", "round");
  svg.appendChild(line);

  // crosshair + hover dot
  const cross = document.createElementNS(svgNS, "line");
  cross.setAttribute("y1", P.t); cross.setAttribute("y2", P.t + ih);
  cross.setAttribute("stroke", "var(--muted)"); cross.setAttribute("stroke-dasharray", "3 3");
  cross.style.display = "none";
  svg.appendChild(cross);
  const dot = document.createElementNS(svgNS, "circle");
  dot.setAttribute("r", "5");
  dot.setAttribute("fill", "#fff"); dot.setAttribute("stroke", opts.colorB);
  dot.setAttribute("stroke-width", "3");
  dot.style.display = "none";
  svg.appendChild(dot);

  container.appendChild(svg);
  const tip = document.createElement("div");
  tip.className = "tooltip";
  const tDate = document.createElement("div"); tDate.className = "t-date";
  const tVal = document.createElement("div"); tVal.className = "t-val";
  tip.append(tDate, tVal);
  container.appendChild(tip);

  const show = (i, clientX) => {
    const p = series[i];
    cross.setAttribute("x1", x(i)); cross.setAttribute("x2", x(i));
    cross.style.display = "";
    dot.setAttribute("cx", x(i)); dot.setAttribute("cy", y(p.v));
    dot.style.display = "";
    tDate.textContent = fmtDate(p.d);
    tVal.textContent = `${fmt(p.v)} ${opts.unit}`;
    tip.style.display = "block";
    const rect = container.getBoundingClientRect();
    const px = (x(i) / W) * rect.width;
    const py = (y(p.v) / H) * rect.height;
    const tw = tip.offsetWidth;
    tip.style.left = Math.min(Math.max(px - tw / 2, 0), rect.width - tw) + "px";
    tip.style.top = Math.max(py - tip.offsetHeight - 16, 0) + "px";
  };
  const hide = () => { cross.style.display = "none"; dot.style.display = "none"; tip.style.display = "none"; };
  svg.addEventListener("pointermove", (e) => {
    const rect = svg.getBoundingClientRect();
    const fx = ((e.clientX - rect.left) / rect.width) * W;
    const i = Math.round(((fx - P.l) / iw) * (n - 1));
    if (i >= 0 && i < n) show(i, e.clientX); else hide();
  });
  svg.addEventListener("pointerleave", hide);
}
function niceCeil(v) {
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10]) if (m * p >= v) return m * p;
  return 10 * p;
}
function fillTable(el, series, unit) {
  el.innerHTML = "";
  const table = document.createElement("table");
  const tr = document.createElement("tr");
  for (const h of ["Date", unit]) { const th = document.createElement("th"); th.textContent = h; tr.appendChild(th); }
  table.appendChild(tr);
  for (let i = series.length - 1; i >= 0; i--) {
    const r = document.createElement("tr");
    const td1 = document.createElement("td"); td1.textContent = series[i].d;
    const td2 = document.createElement("td"); td2.textContent = fmt(series[i].v);
    r.append(td1, td2); table.appendChild(r);
  }
  el.appendChild(table);
}

// ---------- app ----------
let GD = [], KD = [], state = { days: 30 };

function slice(series, days) {
  if (!days) return series;
  return series.slice(Math.max(0, series.length - days));
}
function prevSlice(series, days) {
  if (!days) return [];
  const end = Math.max(0, series.length - days);
  return series.slice(Math.max(0, end - days), end);
}
const sum = (s) => s.reduce((a, p) => a + p.v, 0);

function tile(label, value, deltaHTML) {
  const d = document.createElement("div"); d.className = "tile";
  const l = document.createElement("div"); l.className = "label"; l.textContent = label;
  const v = document.createElement("div"); v.className = "value"; v.textContent = value;
  d.append(l, v);
  if (deltaHTML) { const dd = document.createElement("div"); dd.className = "delta"; dd.append(deltaHTML); d.appendChild(dd); }
  return d;
}
function deltaNode(cur, prev) {
  if (!prev) return null;
  const span = document.createElement("span");
  const pct = prev === 0 ? null : ((cur - prev) / prev) * 100;
  if (pct === null) return null;
  const arrow = document.createElement("span");
  arrow.className = pct >= 0 ? "up" : "down";
  arrow.textContent = `${pct >= 0 ? "↑" : "↓"} ${Math.abs(pct).toFixed(1)}%`;
  span.append(arrow, document.createTextNode(" vs previous period"));
  return span;
}

function render() {
  const days = state.days;
  const g = slice(GD, days), k = slice(KD, days);
  const gp = prevSlice(GD, days), kp = prevSlice(KD, days);

  const tiles = $("tiles"); tiles.innerHTML = "";
  const gSum = sum(g), kSum = sum(k);
  const best = g.reduce((a, p) => (p.v > a.v ? p : a), { v: 0, d: "" });
  const g30 = slice(GD, 30);   // avg is always the trailing 30 days, independent of the range filter
  tiles.appendChild(tile("GIPHY views", fmt(gSum), deltaNode(gSum, sum(gp))));
  tiles.appendChild(tile("GIPHY avg / day (30d)", fmt(Math.round(sum(g30) / Math.max(1, g30.length)))));
  tiles.appendChild(tile("GIPHY best day", best.d ? `${fmtShort(best.v)} · ${fmtTick(best.d, false)}` : "—"));
  tiles.appendChild(tile("KLIPY impressions", fmt(kSum), deltaNode(kSum, sum(kp))));

  lineChart($("giphyChart"), g, { id: "g", colorA: "var(--giphy-a)", colorB: "var(--giphy-b)", unit: "Views", aria: "GIPHY daily views line chart" });
  lineChart($("klipyChart"), k, { id: "k", colorA: "var(--klipy)", colorB: "var(--klipy)", unit: "Impressions", aria: "KLIPY daily impressions line chart" });
  fillTable($("giphyTable"), g, "Views");
  fillTable($("klipyTable"), k, "Impressions");
}

async function boot() {
  try {
    const [gdaily, kdaily, gviews, gboard, ktop, kcountries] = await Promise.all([
      getCSV("giphy-daily.csv"), getCSV("klipy-impressions-daily.csv"),
      getCSV("giphy-views.csv"), getCSV("giphy-leaderboard.csv"),
      getCSV("klipy-top-performing.csv"), getCSV("klipy-top-countries.csv"),
    ]);
    GD = gdaily.map(r => ({ d: r.date, v: +r.views || 0 }));
    KD = kdaily.map(r => ({ d: r.date, v: +r.impressions || 0 }));
    const latestSnap = (rows) => rows.length ? rows.reduce((a, r) => r.snapshot_date > a ? r.snapshot_date : a, "") : "";

    // top gifs grid (all-time leaderboard, titles joined from views csv)
    const titles = new Map(gviews.map(r => [r.gif_id, r.title]));
    const grid = $("gifgrid");
    for (const r of gboard.filter(r => r.snapshot_date === latestSnap(gboard)).slice(0, 18)) {
      const a = document.createElement("a");
      a.className = "gifcard"; a.href = `https://giphy.com/gifs/${r.gif_id}`; a.target = "_blank"; a.rel = "noopener";
      const img = document.createElement("img");
      img.loading = "lazy"; img.alt = titles.get(r.gif_id) || r.gif_id;
      img.src = `https://media.giphy.com/media/${r.gif_id}/200w.gif`;
      img.onerror = () => { img.style.visibility = "hidden"; };
      const v = document.createElement("div"); v.className = "g-views"; v.textContent = fmtShort(+r.views) + " views";
      const t = document.createElement("div"); t.className = "g-title"; t.textContent = titles.get(r.gif_id) || r.gif_id;
      a.append(img, v, t);
      grid.appendChild(a);
    }

    // klipy top list
    const klTop = $("klipyTop");
    for (const r of ktop.filter(r => r.snapshot_date === latestSnap(ktop)).slice(0, 6)) {
      const row = document.createElement("div"); row.className = "toprow";
      const a = document.createElement("a"); a.href = r.url; a.target = "_blank"; a.rel = "noopener";
      a.textContent = r.title;
      const n = document.createElement("span"); n.className = "t-n"; n.textContent = fmt(+r.impressions);
      row.append(a, n); klTop.appendChild(row);
    }

    // countries bars (sequential magnitude, single hue)
    const cs = kcountries.filter(r => r.snapshot_date === latestSnap(kcountries))
                         .sort((a, b) => +b.impressions - +a.impressions).slice(0, 10);
    const cMax = Math.max(1, ...cs.map(r => +r.impressions));
    const cEl = $("countries");
    for (const r of cs) {
      const row = document.createElement("div"); row.className = "barrow";
      const l = document.createElement("div"); l.className = "b-label"; l.textContent = r.country;
      const track = document.createElement("div"); track.className = "b-track";
      const fill = document.createElement("div"); fill.className = "b-fill";
      fill.style.width = Math.max(2, (+r.impressions / cMax) * 100) + "%";
      fill.style.background = "var(--klipy)";
      track.appendChild(fill);
      const v = document.createElement("div"); v.className = "b-val"; v.textContent = fmtShort(+r.impressions);
      row.append(l, track, v); cEl.appendChild(row);
    }

    $("filters").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      for (const x of $("filters").children) x.classList.toggle("active", x === b);
      state.days = b.dataset.days ? +b.dataset.days : null;
      render();
    });
    let rto; addEventListener("resize", () => { clearTimeout(rto); rto = setTimeout(render, 150); });
    render();
  } catch (e) {
    const el = $("err"); el.style.display = "block";
    el.textContent = "Failed to load stats data: " + e.message +
      " — make sure this page is served by dashboard\\serve-dashboard.ps1 (port 8125) and the CSVs exist in data\\stats\\.";
  }
}
boot();
</script>
</body>
</html>
